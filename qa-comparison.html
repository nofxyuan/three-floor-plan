<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>收發室牆面修正比較</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 24px; background: #222; color: #f5f5f5; font: 15px/1.5 system-ui, sans-serif; }
      h1 { margin: 0 0 18px; font-size: 20px; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      figure { margin: 0; padding: 14px; background: #303030; border-radius: 12px; }
      figcaption { margin-bottom: 10px; color: #ddd; }
      img { display: block; width: 100%; height: 480px; object-fit: contain; background: #e8e8e3; }
      .note { margin: 18px 0 0; color: #b7e2bb; }
    </style>
  </head>
  <body>
    <h1>收發室牆面：修正前／修正後</h1>
    <main>
      <figure>
        <figcaption>修正前：門扇、開門弧線與深色門框</figcaption>
        <img src="/qa-source.png" alt="修正前收發室" />
      </figure>
      <figure>
        <figcaption>修正後：連續實體牆面</figcaption>
        <img src="/qa-implementation.png" alt="修正後收發室" />
      </figure>
    </main>
    <p class="note">驗收重點：收發室上方不再出現門扇或弧線，原雙線牆框已合併為單一牆體。</p>
  </body>
</html>
